name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'frontend/android/**'
      - 'frontend/capacitor.config.json'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > frontend/android/app/google-services.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor (generates cordova-plugins dir)
        working-directory: frontend
        run: npx cap sync android

      - name: Grant gradlew execute permission
        run: chmod +x frontend/android/gradlew

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LakeZone-ERP
          path: frontend/android/app/build/outputs/apk/debug/LakeZone-ERP-v*.apk
          retention-days: 30
